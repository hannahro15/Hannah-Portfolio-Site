name: Create Back to Top Issue

on:
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  create-issue:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create Back to Top issue if not already present
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -e
          TITLE='Feature: Add a "Back to Top" Button on the Projects Page'

          existing=$(gh issue list --repo "$REPO" --state all --limit 100 --json title \
            --jq --arg t "$TITLE" '.[] | select(.title == $t) | .title')

          if [ -n "$existing" ]; then
            echo "Issue already exists — skipping."
          else
            body=$(tail -n +3 ".github/ISSUE_DRAFTS/08-add-back-to-top-button.md")
            gh issue create --repo "$REPO" --title "$TITLE" --body "$body"
            echo "Issue created."
          fi
